<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>後台 · AI 願望池</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      var t = 'day'
      try { t = localStorage.getItem('wishpool_theme') || 'day' } catch (e) {}
      if (t === 'day') document.documentElement.classList.add('theme-day')
    })()
  </script>
</head>
<body>
  <div class="wrap">
    <header class="hero"><span class="kicker">Admin</span><h1>願望池後台</h1></header>
    <div class="bar">
      <input id="token" type="password" autocomplete="off" placeholder="貼上 ADMIN_TOKEN" style="max-width:280px">
      <button id="save-token" class="primary">記住</button>
      <span class="spacer"></span>
      <button id="export">匯出全部 JSON</button>
      <button class="sort" id="theme-toggle" aria-label="切換晨光或夜晚">夜晚</button>
    </div>
    <div class="bar">
      <button class="sort active" data-status="pending">待審</button>
      <button class="sort" data-status="published">已上牆</button>
      <button class="sort" data-status="adopted">已採納</button>
      <button class="sort" data-status="building">開發中</button>
      <button class="sort" data-status="done">已完成</button>
      <button class="sort" data-status="hidden">已隱藏</button>
    </div>
    <div id="list"></div>
    <p id="hint" class="muted"></p>
  </div>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
