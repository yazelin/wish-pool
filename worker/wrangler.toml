name = "wish-pool"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "wish-pool"
# database_id 由 `wrangler d1 create wish-pool` 取得後貼入(user 執行)
database_id = "REPLACE_AFTER_D1_CREATE"

[vars]
ALLOWED_ORIGIN = "http://localhost:8788"   # 部署後改成 GitHub Pages 網址
GROQ_BASE = "https://api.groq.com/openai/v1"
GROQ_MODEL = "openai/gpt-oss-120b"

# Secrets(用 `wrangler secret put <NAME>`,不放這裡):
#   GROQ_API_KEY   TURNSTILE_SECRET   ADMIN_TOKEN   IP_SALT
